<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Protected</title>
<style>
  :root{--blue:#0037FF;--ink:#10141D;--line:#E9EBF1;--muted:#656C81;--bg:#f6f7fb}
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
       display:flex;align-items:center;justify-content:center;color:var(--ink)}
  .gate{width:min(92vw,340px);text-align:center}
  .lock{width:34px;height:34px;margin:0 auto 18px;color:var(--muted)}
  form{display:flex;gap:8px}
  input{flex:1;font:inherit;font-size:15px;padding:12px 14px;border:1px solid var(--line);
        border-radius:11px;background:#fff;color:var(--ink);outline:none}
  input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,55,255,.14)}
  button{font:inherit;font-weight:700;font-size:14px;padding:0 18px;border:0;border-radius:11px;
         background:var(--blue);color:#fff;cursor:pointer}
  button:disabled{opacity:.55;cursor:default}
  .err{min-height:18px;margin-top:12px;font-size:12.5px;color:#F13030;opacity:0;transition:opacity .15s}
  .err.show{opacity:1}
</style></head>
<body>
  <div class="gate">
    <svg class="lock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    <form id="f" autocomplete="off">
      <input id="pw" type="password" placeholder="Password" autofocus aria-label="Password" spellcheck="false">
      <button id="go" type="submit">Unlock</button>
    </form>
    <div class="err" id="err">Incorrect password</div>
  </div>

const f=document.getElementById("f"), pw=document.getElementById("pw"),
      go=document.getElementById("go"), err=document.getElementById("err");
pw.addEventListener("input",()=>err.classList.remove("show"));
async function decrypt(pass){
  const e=new TextEncoder();
  const base=await crypto.subtle.importKey("raw",e.encode(pass),"PBKDF2",false,["deriveKey"]);
  const key=await crypto.subtle.deriveKey(
    {name:"PBKDF2",salt:SALT,iterations:ITER,hash:"SHA-256"},
    base,{name:"AES-GCM",length:256},false,["decrypt"]);
  const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:IV},key,CT);
  return new TextDecoder("utf-8").decode(pt);
}
f.addEventListener("submit",async ev=>{
  ev.preventDefault();
  if(!pw.value) return;
  go.disabled=true; go.textContent="…";
  try{
    const html=await decrypt(pw.value);
    document.open(); document.write(html); document.close();
  }catch(_){
    go.disabled=false; go.textContent="Unlock";
    err.classList.add("show"); pw.value=""; pw.focus();
  }
});
</script>
